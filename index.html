<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流光指標卡組件 - 整合編輯功能</title>
    <style>
        /* ==========================================
           1. 畫布環境重置（去除網頁邊距，背景設為透明）
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: transparent; 
            display: inline-block;         
            overflow: hidden;
            padding: 20px; /* 加點邊距方便在瀏覽器測試，實際嵌入可刪除 */
        }

        /* ==========================================
           2. 流動光圈指標卡核心樣式（340px * 220px）
           ========================================== */
        .glow-card-container {
            position: relative;
            width: 340px;
            height: 220px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        /* 旋轉的極光流體 */
        .glow-card-container::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 140%;
            background: linear-gradient(#3370ff, #00e5ff);
            animation: rotateGlow 4s linear infinite;
        }

        .glow-card-container:hover::before {
            background: linear-gradient(#ff007f, #00e5ff);
            animation: rotateGlow 2s linear infinite;
        }

        /* 內層深色面板 */
        .card-inner-content {
            position: absolute;
            inset: 2px; /* 2px 的流光邊框寬度 */
            background: #111827; 
            border-radius: 18px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 2;
            overflow: hidden; /* 確保子元件（如彈窗）不溢出邊框 */
        }

        /* ==========================================
           3. 內部排版與文字
           ========================================== */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 15px;
            font-weight: 500;
            color: #9ca3af;
            letter-spacing: 0.5px;
        }

        /* LIVE 閃爍呼吸燈（增加點擊手勢） */
        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #00e5ff;
            background: rgba(0, 229, 255, 0.1);
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }

        .live-badge:hover {
            background: rgba(0, 229, 255, 0.25);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #00e5ff;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .card-body {
            margin-top: 10px;
            display: flex;
            align-items: baseline;
        }

        .metric-number {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: -1px;
        }

        .metric-unit {
            font-size: 16px;
            color: #6b7280;
            margin-left: 6px;
        }

        .card-footer {
            font-size: 13px;
            color: #4b5563;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .trend-up {
            color: #10b981;
            font-weight: 600;
        }

        /* ==========================================
           4. 新增：修改指標的小窗口 (Modal Panel)
           ========================================== */
        .edit-panel {
            position: absolute;
            inset: 0; /* 完美填滿 card-inner-content，不溢出 */
            background: rgba(17, 24, 39, 0.95); /* 深色遮罩 */
            backdrop-filter: blur(4px);
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }

        /* 當啟動修改時顯示 */
        .edit-panel.active {
            opacity: 1;
            pointer-events: auto;
        }

        .edit-panel-title {
            font-size: 14px;
            color: #00e5ff;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .form-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group label {
            font-size: 12px;
            color: #9ca3af;
            width: 40px;
            flex-shrink: 0;
        }

        .form-group input {
            flex: 1;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 6px;
            color: #fff;
            padding: 4px 8px;
            font-size: 12px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00e5ff;
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 6px;
        }

        .btn {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            font-weight: 500;
        }

        .btn-submit {
            background: #00e5ff;
            color: #111827;
        }

        .btn-cancel {
            background: #374151;
            color: #9ca3af;
        }

        /* ==========================================
           5. 動態特效 Animation
           ========================================== */
        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            70% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 6px rgba(0, 229, 255, 0); }
            100% { transform: scale(0.8); opacity: 0.5; box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="glow-card-container">
        <div class="card-inner-content">
            <div class="card-header">
                <span class="card-title" id="cardTitle">实时自动化生产速度</span>
                <div class="live-badge" id="liveBtn">
                    <span class="pulse-dot"></span>LIVE
                </div>
            </div>
            <div class="card-body">
                <span class="metric-number" id="dynamicNum" data-target="38450">0</span>
                <span class="metric-unit" id="metricUnit">pcs/hr</span>
            </div>
            <div class="card-footer">
                <span class="trend-up">▲ 14.8%</span>
                <span style="color: #6b7280;">对比昨日同时段</span>
            </div>

            <div class="edit-panel" id="editPanel">
                <div class="edit-panel-title">參數設定</div>
                <div class="form-group">
                    <label>標題</label>
                    <input type="text" id="inputTitle" value="">
                </div>
                <div class="form-group">
                    <label>數值</label>
                    <input type="number" id="inputNum" value="">
                </div>
                <div class="form-group">
                    <label>單位</label>
                    <input type="text" id="inputUnit" value="">
                </div>
                <div class="btn-group">
                    <button class="btn btn-cancel" id="btnCancel">取消</button>
                    <button class="btn btn-submit" id="btnSave">確定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const numElement = document.getElementById('dynamicNum');
            const titleElement = document.getElementById('cardTitle');
            const unitElement = document.getElementById('metricUnit');
            
            const liveBtn = document.getElementById('liveBtn');
            const editPanel = document.getElementById('editPanel');
            const btnCancel = document.getElementById('btnCancel');
            const btnSave = document.getElementById('btnSave');

            const inputTitle = document.getElementById('inputTitle');
            const inputNum = document.getElementById('inputNum');
            const inputUnit = document.getElementById('inputUnit');

            let target = parseInt(numElement.getAttribute('data-target'));
            const duration = 2000; 
            let stepTime = Math.max(Math.floor(duration / target), 15);
            let current = 0;
            let fluctuationInterval; // 用來儲存和清除跳動定時器
            
            // 初始跑馬燈數字動畫
            const timer = setInterval(() => {
                current += Math.ceil(target / (duration / stepTime));
                if (current >= target) {
                    numElement.textContent = target.toLocaleString();
                    clearInterval(timer);
                    startLiveFluctuation();
                } else {
                    numElement.textContent = current.toLocaleString();
                }
            }, stepTime);

            // 隨機動態跳動函數
            function startLiveFluctuation() {
                if(fluctuationInterval) clearInterval(fluctuationInterval);
                fluctuationInterval = setInterval(() => {
                    let currentNum = parseInt(numElement.textContent.replace(/,/g, ''));
                    if(!isNaN(currentNum)) {
                        const change = Math.floor(Math.random() * 31) - 15; // -15 ~ +15 隨機變動
                        numElement.textContent = (currentNum + change).toLocaleString();
                    }
                }, 3000);
            }

            // 點擊 LIVE 開啟控制面板
            liveBtn.addEventListener('click', () => {
                // 將當前卡片文字與數值填入輸入框
                inputTitle.value = titleElement.textContent;
                inputNum.value = parseInt(numElement.textContent.replace(/,/g, '')) || target;
                inputUnit.value = unitElement.textContent;

                editPanel.classList.add('active');
            });

            // 關閉面板（取消）
            btnCancel.addEventListener('click', () => {
                editPanel.classList.remove('active');
            });

            // 儲存修改
            btnSave.addEventListener('click', () => {
                // 更新標題與單位
                titleElement.textContent = inputTitle.value;
                unitElement.textContent = inputUnit.value;

                // 更新核心數值與 target 的基底
                const newNum = parseInt(inputNum.value);
                if (!isNaN(newNum)) {
                    target = newNum;
                    numElement.textContent = target.toLocaleString();
                    numElement.setAttribute('data-target', target);
                    
                    // 重啟即時數值隨機微幅跳動
                    startLiveFluctuation();
                }

                editPanel.classList.remove('active');
            });
        });
    </script>
</body>
</html>
